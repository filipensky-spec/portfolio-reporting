<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Garage Angels</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #2563eb;
    --gray-50: #f9fafb;
    --gray-200: #e5e7eb;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-900: #111827;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fff;
    color: var(--gray-900);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.6;
  }
  .card {
    max-width: 480px;
    text-align: center;
  }
  .logo {
    width: 64px; height: 64px;
    background: var(--accent);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 22px;
    margin: 0 auto 32px;
    letter-spacing: -0.5px;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 16px;
    letter-spacing: -0.8px;
  }
  p {
    color: var(--gray-500);
    font-size: 16px;
    margin-bottom: 12px;
  }
  .contact {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--gray-200);
    font-size: 14px;
    color: var(--gray-600);
  }
  .contact a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .contact a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">GA</div>
    <h1>Garage Angels</h1>
    <p>Tato stránka není veřejná.</p>
    <p>Pokud jste sem dorazili omylem, zkuste prosím přímý odkaz, který vám byl poslán.</p>
    <div class="contact">
      Kontakt: <a href="mailto:filipensky@g-angels.cz">filipensky@g-angels.cz</a>
    </div>
  </div>
</body>
</html>
