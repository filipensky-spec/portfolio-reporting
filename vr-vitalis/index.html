<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Vitalis - Investor Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR STYLES */
        .sidebar {
            width: 250px;
            background-color: #1a1d2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .sidebar-header {
            margin-bottom: 32px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: #4361ee;
        }

        .sidebar-subtitle {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b8fa8;
            font-weight: 500;
        }

        .reports-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .report-button {
            padding: 12px 16px;
            background-color: transparent;
            color: #b8bcc8;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .report-button:hover {
            background-color: rgba(67, 97, 238, 0.15);
            color: #ffffff;
        }

        .report-button.active {
            background-color: #4361ee;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }

        .sidebar-footer {
            border-top: 1px solid rgba(139, 143, 168, 0.2);
            padding-top: 16px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #8b8fa8;
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 500;
        }

        .back-link:hover {
            color: #b8bcc8;
        }

        .back-link::before {
            content: '←';
            font-size: 14px;
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }

        .content-header {
            padding: 24px 32px;
            border-bottom: 1px solid #e5e7eb;
            background-color: #ffffff;
        }

        .report-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1d2e;
            margin-bottom: 4px;
        }

        .report-date {
            font-size: 13px;
            color: #8b8fa8;
            font-weight: 500;
        }

        .content-iframe-container {
            flex: 1;
            overflow: hidden;
            background-color: #f9fafb;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 16px;
                max-height: 120px;
                flex-direction: row;
                align-items: flex-start;
                overflow-x: auto;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }

            .sidebar-header {
                margin-right: 32px;
                margin-bottom: 0;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .sidebar-title {
                font-size: 16px;
            }

            .sidebar-subtitle {
                font-size: 11px;
            }

            .reports-list {
                flex-direction: row;
                gap: 8px;
                margin-bottom: 0;
                flex: 1;
                overflow-x: auto;
                padding-bottom: 8px;
            }

            .report-button {
                padding: 8px 12px;
                font-size: 12px;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .sidebar-footer {
                display: none;
            }

            .content-header {
                padding: 16px 20px;
            }

            .report-title {
                font-size: 18px;
            }

            .report-date {
                font-size: 12px;
            }
        }

        /* SCROLLBAR STYLING */
        .sidebar::-webkit-scrollbar,
        .reports-list::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .sidebar::-webkit-scrollbar-track,
        .reports-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background-color: rgba(139, 143, 168, 0.3);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(139, 143, 168, 0.5);
        }

        .reports-list::-webkit-scrollbar-thumb {
            background-color: rgba(67, 97, 238, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">VR VITALIS</div>
            <div class="sidebar-subtitle">Investor Reports</div>
        </div>

        <div class="reports-list" id="reportsList">
            <!-- Reports will be populated here by JavaScript -->
        </div>

        <div class="sidebar-footer">
            <a href="../index.html" class="back-link">Zpět na portál</a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="content-header">
            <div class="report-title" id="reportTitle">Zpráva o investicích</div>
            <div class="report-date" id="reportDate">19. bře{>Yris 2026</div>
        </div>

        <div class="content-iframe-container">
            <iframe id="reportFrame" class="content-iframe" src="./2026-03-19/index.html"></iframe>
        </div>
    </div>

    <script>
        // Report configuration - most recent first
        const reports = [
            { date: '19. 3. 2026', folder: '2026-03-19', dateObj: new Date(2026, 2, 19) }
            // Additional reports will be added here as they become available
        ];

        // Initialize sidebar
        function initializeSidebar() {
            const reportsList = document.getElementById('reportsList');

            reports.forEach((report, index) => {
                const button = document.createElement('button');
                button.className = 'report-button';
                if (index === 0) {
                    button.classList.add('active');
                }
                button.textContent = report.date;
                button.setAttribute('data-folder', report.folder);
                button.setAttribute('data-date', report.date);

                button.addEventListener('click', () => {
                    loadReport(report);
                    updateActiveButton(button);
                });

                reportsList.appendChild(button);
            });
        }

        // Load report via iframe
        function loadReport(report) {
            const iframe = document.getElementById('reportFrame');
            const titleElement = document.getElementById('reportTitle');
            const dateElement = document.getElementById('reportDate');

            iframe.src = `./${report.folder}/index.html`;
            titleElement.textContent = 'Zpráva o investicích';
            dateElement.textContent = report.date;
        }

        // Update active button state
        function updateActiveButton(activeButton) {
            const allButtons = document.querySelectorAll('.report-button');
            allButtons.forEach(btn => btn.classList.remove('active'));
            activeButton.classList.add('active');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeSidebar);
    </script>
</body>
</html>
