<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scaut — Investor Reports | Garage Angels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark: #1a1a2e;
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-bg: #eff6ff;
            --green: #10b981;
            --green-bg: #ecfdf5;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --white: #ffffff;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.06);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: var(--gray-50);
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--gray-200);
        }
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .sidebar-logo img {
            height: 40px;
            width: auto;
        }
        .startup-name {
            font-size: 20px;
            font-weight: 800;
            color: var(--gray-900);
            letter-spacing: -0.5px;
        }
        .startup-sub {
            font-size: 13px;
            color: var(--gray-500);
            margin-top: 2px;
        }
        .startup-badge {
            display: inline-block;
            background: var(--green-bg);
            color: var(--green);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        /* REPORT LIST */
        .report-section {
            padding: 16px 20px;
            flex: 1;
        }
        .report-section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .report-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            background: var(--white);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
            width: 100%;
        }
        .report-btn:hover {
            border-color: var(--accent);
            background: var(--accent-bg);
        }
        .report-btn.active {
            border-color: var(--accent);
            background: var(--accent-bg);
            box-shadow: var(--shadow-sm);
        }
        .report-btn-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-300);
            flex-shrink: 0;
        }
        .report-btn.active .report-btn-dot {
            background: var(--accent);
        }
        .report-btn-text {
            flex: 1;
        }
        .report-btn-date {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-900);
        }
        .report-btn-label {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 1px;
        }
        .report-btn.baseline .report-btn-dot {
            background: var(--green);
        }
        .report-btn.baseline.active .report-btn-dot {
            background: var(--green);
        }

        /* DIVIDER */
        .sidebar-divider {
            height: 1px;
            background: var(--gray-200);
            margin: 8px 20px;
        }

        /* SIDEBAR FOOTER */
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--gray-200);
        }
        .sidebar-back {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--gray-500);
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .sidebar-back:hover { color: var(--accent); }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .main-header {
            padding: 16px 32px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .main-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-900);
        }
        .main-date {
            font-size: 13px;
            color: var(--gray-500);
        }
        .main-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: var(--white);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 220px;
                border-right: none;
                border-bottom: 1px solid var(--gray-200);
            }
            .sidebar-header { padding: 16px; }
            .report-section { padding: 12px 16px; }
            .report-list { flex-direction: row; overflow-x: auto; gap: 8px; }
            .report-btn { min-width: 140px; flex-shrink: 0; }
            .main-header { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <a href="../" class="sidebar-logo">
            <img src="Garage_Angels_logo_FINAL_v4.png" alt="Garage Angels">
        </a>
        <div class="startup-name">Scaut</div>
        <div class="startup-sub">Kybernetická bezpečnost</div>
        <div class="startup-badge">Aktivní</div>
    </div>

    <div class="report-section">
        <div class="report-section-label">Reporty</div>
        <div class="report-list" id="reportList">
            <!-- Reports are populated by JS — newest first, baseline last -->
        </div>
    </div>

    <div class="sidebar-footer">
        <a href="../" class="sidebar-back">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg>
            Zpět na přehled
        </a>
    </div>
</aside>

<main class="main">
    <div class="main-header">
        <div class="main-title" id="mainTitle">Investor Report</div>
        <div class="main-date" id="mainDate"></div>
    </div>
    <iframe class="main-iframe" id="mainIframe"></iframe>
</main>

<script>
// === REPORT CONFIGURATION ===
// Newest reports first. Baseline is always last.
const REPORTS = [
    { date: 'Baseline', folder: 'baseline', label: 'Investiční přehled', isBaseline: true }
];

function initSidebar() {
    const list = document.getElementById('reportList');
    list.innerHTML = '';

    REPORTS.forEach((report, i) => {
        const btn = document.createElement('button');
        btn.className = 'report-btn' + (report.isBaseline ? ' baseline' : '') + (i === 0 ? ' active' : '');
        btn.innerHTML = `
            <div class="report-btn-dot"></div>
            <div class="report-btn-text">
                <div class="report-btn-date">${report.date}</div>
                <div class="report-btn-label">${report.label}</div>
            </div>
        `;
        btn.onclick = () => loadReport(report, btn);
        list.appendChild(btn);
    });

    if (REPORTS.length > 0) loadReport(REPORTS[0]);
}

function loadReport(report, clickedBtn) {
    document.getElementById('mainIframe').src = report.folder + '/index.html';
    document.getElementById('mainTitle').textContent = report.isBaseline ? 'Investiční přehled — Baseline' : 'Investor Report';
    document.getElementById('mainDate').textContent = report.isBaseline ? 'Stav k datu poslední investice' : report.date;

    document.querySelectorAll('.report-btn').forEach(b => b.classList.remove('active'));
    if (clickedBtn) {
        clickedBtn.classList.add('active');
    } else {
        document.querySelector('.report-btn')?.classList.add('active');
    }
}

initSidebar();
</script>
</body>
</html>
